name: Build & Deploy — MCP Server
on:
  push:
    branches: [main]
env:
  NODE_OPTIONS: --max-old-space-size=4096
jobs:
  build-and-deploy:
    if: github.repository == 'AaroYazilim/mcp-server'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 23422
          source: "dist,package.json,package-lock.json"
          target: "/var/www/mcp-server"

      - name: Install deps & restart PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 23422
          script: |
            cd /var/www/mcp-server
            npm ci --omit=dev

            # Sunucuda dotenv veya export araciligiyla API_TOKEN ve ERP_BEARER_TOKEN vs. okundugunu varsayiyoruz.
            # TRANSPORT=sse modunda ayaga kalkmasi icin zorluyoruz
            TRANSPORT=sse pm2 restart mcp-server || TRANSPORT=sse pm2 start dist/index.js --name mcp-server
            pm2 save
